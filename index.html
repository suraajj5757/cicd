<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffd6e7,#ffe4ef,#ffd1dc);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    padding:30px;
}

.teddy{
    font-size:120px;
    animation:bounce 2s infinite;
}

h1{
    color:#ff2f7b;
    font-size:3rem;
    margin:20px 0;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

button{
    border:none;
    border-radius:50px;
    padding:15px 40px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:#ff4f8b;
    color:white;
    box-shadow:0 8px 20px rgba(255,79,139,.3);
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:white;
    color:#ff4f8b;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.success{
    display:none;
    text-align:center;
}

.success .big-teddy{
    font-size:180px;
    animation:bounce 1.5s infinite;
}

.success h2{
    color:#ff2f7b;
    font-size:3rem;
    margin-top:20px;
}

.success p{
    color:#555;
    font-size:1.4rem;
    margin-top:10px;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

.hearts{
    position:fixed;
    font-size:30px;
    animation:float 4s linear forwards;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-300px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container" id="proposal">

    <div class="teddy">🧸</div>

    <h1>Will You Marry Me? 💍❤️</h1>

    <div class="buttons">
        <button id="yesBtn">YES ❤️</button>
        <button id="noBtn">NO 😭</button>
    </div>

</div>

<div class="success" id="success">
    <div class="big-teddy">🧸</div>
    <h2>Congratulations! 🎉❤️</h2>
    <p>Order Placed Successfully Teddy 🧸💝</p>
</div>

<script>

const noBtn = document.getElementById("noBtn");
let escapeCount = 0;

const texts = [
    "NO 😭",
    "NO 🙈",
    "Are You Sure? 🤔",
    "Think Again 😏",
    "Last Chance 😅"
];

function moveButton(){

    escapeCount++;

    if(escapeCount <= 5){
        noBtn.innerText = texts[escapeCount-1];
    }

    // After 5 escapes convert to YES
    if(escapeCount > 5){

        noBtn.innerHTML = "YES ❤️";
        noBtn.style.background = "#ff4f8b";
        noBtn.style.color = "white";
        noBtn.style.position = "static";

        noBtn.onmouseenter = null;
        noBtn.onmousemove = null;
        noBtn.onmouseover = null;

        noBtn.onclick = celebrate;

        return;
    }

    noBtn.style.position = "fixed";

    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

// Instant escape
noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("mousemove", moveButton);

// Cursor gets close -> run away
document.addEventListener("mousemove",(e)=>{

    if(escapeCount > 5) return;

    const rect = noBtn.getBoundingClientRect();

    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width/2),
        e.clientY - (rect.top + rect.height/2)
    );

    if(distance < 150){
        moveButton();
    }
});

function celebrate(){

    document.getElementById("proposal").style.display = "none";
    document.getElementById("success").style.display = "block";

    for(let i=0;i<40;i++){

        const heart = document.createElement("div");

        heart.className = "hearts";
        heart.innerHTML = ["❤️","💖","💕","💗","💘"][Math.floor(Math.random()*5)];

        heart.style.left = Math.random()*window.innerWidth + "px";
        heart.style.top = window.innerHeight + "px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },4000);
    }
}

document.getElementById("yesBtn").addEventListener("click", celebrate);

</script>

</body>
</html>

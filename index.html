<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
}

h1{
    color:#ff2d75;
    font-size:3rem;
    margin-bottom:30px;
}

.teddy{
    font-size:120px;
    margin-bottom:20px;
}

.buttons{
    position:relative;
    width:400px;
    height:180px;
    margin:auto;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    transition:0.2s;
}

#yesBtn{
    background:#ff4f8b;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    position:absolute;
    left:240px;
    top:0;
    background:#ffffff;
    color:#ff4f8b;
}

.success{
    display:none;
    animation:pop 0.5s ease;
}

.success h2{
    color:#ff2d75;
    font-size:2.5rem;
    margin-top:20px;
}

.success p{
    font-size:1.3rem;
    margin-top:10px;
    color:#444;
}

@keyframes pop{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>
<body>

<div class="container" id="proposal">
    <div class="teddy">🧸</div>
    <h1>Will You Marry Me? 💍❤️</h1>

    <div class="buttons" id="buttonArea">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😢</button>
    </div>
</div>

<div class="success" id="success">
    <div style="font-size:150px;">🧸</div>
    <h2>Congratulations! ❤️</h2>
    <p>Order Placed Successfully Teddy 🧸🎉</p>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const area = document.getElementById("buttonArea");

area.addEventListener("mousemove", (e) => {

    const rect = noBtn.getBoundingClientRect();

    const btnX = rect.left + rect.width/2;
    const btnY = rect.top + rect.height/2;

    const distance = Math.hypot(
        e.clientX - btnX,
        e.clientY - btnY
    );

    if(distance < 120){

        const maxX = area.clientWidth - noBtn.offsetWidth;
        const maxY = area.clientHeight - noBtn.offsetHeight;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }
});

document.getElementById("yesBtn").addEventListener("click", () => {
    document.getElementById("proposal").style.display = "none";
    document.getElementById("success").style.display = "block";
});
</script>

</body>
</html>

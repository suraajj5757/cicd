<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ffd6e7,#ffe4ef,#ffd1dc,#ffc0cb);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    text-align:center;
    background:rgba(255,255,255,.25);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:40px;
    width:min(90%,700px);
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.teddy{
    font-size:110px;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    50%{transform:translateY(-15px);}
}

h1{
    color:#ff2f7b;
    margin:20px 0;
    font-size:3rem;
}

#message{
    color:#444;
    font-size:1.3rem;
    min-height:80px;
    margin-bottom:25px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:50px;
    padding:15px 35px;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
    font-weight:700;
}

#yesBtn{
    background:#ff4f8b;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    background:white;
    color:#ff2f7b;
}

.counter{
    margin-top:20px;
    color:#ff2f7b;
    font-weight:bold;
}

.heart{
    position:fixed;
    font-size:25px;
    animation:float 5s linear forwards;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

#success{
    display:none;
}

#success h2{
    color:#ff2f7b;
    font-size:3rem;
}

#success p{
    margin-top:15px;
    font-size:1.3rem;
}
</style>
</head>
<body>

<div class="card" id="proposal">

    <div class="teddy">🧸</div>

    <h1>Will You Marry Me? 💍❤️</h1>

    <div id="message">
        I have one important question for you... 🥰
    </div>

    <div class="buttons">
        <button id="yesBtn">YES ❤️</button>
        <button id="noBtn">NO 😭</button>
    </div>

    <div class="counter" id="counter"></div>

</div>

<div class="card" id="success">

    <div style="font-size:150px">🧸💖</div>

    <h2>She Said YES! 🎉</h2>

    <p>
        💍 Proposal Accepted<br><br>
        🧸 1 Teddy Bear Ordered<br>
        ❤️ Lifetime Love Subscription Activated<br>
        ✨ Unlimited Hugs Enabled
    </p>

</div>

<script>

const msg = document.getElementById("message");
const noBtn = document.getElementById("noBtn");
const counter = document.getElementById("counter");

let phase = 1;
let escapeCount = 0;
let cooldown = false;

const chaseMessages = [
"😜 You almost got me!",
"😏 Too slow!",
"😂 Nice try!",
"🏃 Catch me if you can!",
"😅 Getting tired?",
"🤣 Still trying?",
"😳 You really want NO?",
"🙈 This is awkward now...",
"❤️ YES is easier...",
"💍 Last Chance!"
];

document.getElementById("yesBtn").onclick = celebrate;

noBtn.onclick = function(e){

    if(phase >= 4){
        e.preventDefault();
        return;
    }

    if(phase === 1){
        phase = 2;
        msg.innerHTML = "🥺 Are you sure?";
        noBtn.innerHTML = "Still No 😭";
        return;
    }

    if(phase === 2){
        phase = 3;
        msg.innerHTML = `
            😘 Think again...<br><br>
            ✨ Unlimited Love<br>
            ✨ Premium Husband Subscription<br>
            ✨ Lifetime Cuddles
        `;
        noBtn.innerHTML = "Still No 🙈";
        return;
    }

    if(phase === 3){
        phase = 4;
        msg.innerHTML =
        "🤨 Hmm... that doesn't seem right. Try catching the NO button now!";
        noBtn.innerHTML = "NOPE 🏃";
    }
};

function moveNoButton(){

    if(phase !== 4) return;
    if(cooldown) return;

    cooldown = true;

    escapeCount++;

    counter.innerHTML =
        "Escapes: " + escapeCount + "/10";

    if(escapeCount <= 10){
        msg.innerHTML = chaseMessages[escapeCount - 1];
    }

    if(escapeCount >= 10){

        phase = 5;

        msg.innerHTML =
        "💖 Last Chance 💖<br><br>Wouldn't YES make a better story?";

        noBtn.style.position = "static";
        noBtn.innerHTML = "YES ❤️";
        noBtn.style.background = "#ff4f8b";
        noBtn.style.color = "white";
        noBtn.onclick = celebrate;

        counter.innerHTML = "";
        return;
    }

    noBtn.style.position = "fixed";

    const maxX =
        window.innerWidth - noBtn.offsetWidth - 20;

    const maxY =
        window.innerHeight - noBtn.offsetHeight - 20;

    noBtn.style.left =
        Math.random() * maxX + "px";

    noBtn.style.top =
        Math.random() * maxY + "px";

    setTimeout(()=>{
        cooldown = false;
    },250);
}

document.addEventListener("mousemove",(e)=>{

    if(phase !== 4) return;

    const rect = noBtn.getBoundingClientRect();

    const centerX =
        rect.left + rect.width/2;

    const centerY =
        rect.top + rect.height/2;

    const distance =
        Math.hypot(
            e.clientX - centerX,
            e.clientY - centerY
        );

    if(distance < 120){
        moveNoButton();
    }
});

function celebrate(){

    document.getElementById("proposal").style.display="none";
    document.getElementById("success").style.display="block";

    for(let i=0;i<80;i++){

        const heart = document.createElement("div");

        heart.className = "heart";

        heart.innerHTML =
            ["❤️","💕","💖","💗","💘"]
            [Math.floor(Math.random()*5)];

        heart.style.left =
            Math.random()*100 + "vw";

        heart.style.bottom = "-50px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },5000);
    }
}

</script>

</body>
</html>

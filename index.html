<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffd6e7,#ffe4ef,#ffd1dc);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    padding:40px;
}

.teddy{
    font-size:120px;
    animation:bounce 2s infinite;
}

h1{
    color:#ff2f7b;
    font-size:3rem;
    margin:20px 0;
}

.buttons{
    margin-top:30px;
}

button{
    border:none;
    border-radius:50px;
    padding:15px 40px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:#ff4f8b;
    color:white;
    margin-right:20px;
    box-shadow:0 8px 20px rgba(255,79,139,.3);
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    position:fixed;
    background:white;
    color:#ff4f8b;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    left:60%;
    top:60%;
    user-select:none;
}

.success{
    display:none;
    text-align:center;
}

.success .big-teddy{
    font-size:180px;
    animation:bounce 1.5s infinite;
}

.success h2{
    color:#ff2f7b;
    font-size:3rem;
    margin-top:20px;
}

.success p{
    color:#555;
    font-size:1.4rem;
    margin-top:10px;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}
</style>
</head>

<body>

<div class="container" id="proposal">

    <div class="teddy">🧸</div>

    <h1>Will You Marry Me? 💍❤️</h1>

    <div class="buttons">
        <button id="yesBtn">YES ❤️</button>
    </div>

</div>

<button id="noBtn">NO 😭</button>

<div class="success" id="success">
    <div class="big-teddy">🧸</div>
    <h2>Congratulations! 🎉❤️</h2>
    <p>Order Placed Successfully Teddy 🧸💝</p>
</div>

<script>

const noBtn = document.getElementById("noBtn");

// Random teleport function
function moveButton() {

    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// Move continuously when mouse comes near
document.addEventListener("mousemove",(e)=>{

    const rect = noBtn.getBoundingClientRect();

    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;

    const dx = e.clientX - centerX;
    const dy = e.clientY - centerY;

    const distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < 250){
        moveButton();
    }
});

// Extra protection
noBtn.addEventListener("mouseenter",moveButton);
noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("mousedown",moveButton);
document.addEventListener("touchstart",moveButton);
document.addEventListener("touchmove",moveButton);

// Impossible to click
noBtn.addEventListener("click",(e)=>{
    e.preventDefault();
    moveButton();
});

// YES button
document.getElementById("yesBtn").addEventListener("click",()=>{

    document.getElementById("proposal").style.display="none";
    document.getElementById("noBtn").style.display="none";

    document.getElementById("success").style.display="block";
});

</script>

</body>
</html>
